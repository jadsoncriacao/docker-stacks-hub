services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT}:11434"

    volumes:
      - ollama_data:/root/.ollama
    networks:
      - local-network

networks:
  local-network:
    external: true

volumes:
  ollama_data: