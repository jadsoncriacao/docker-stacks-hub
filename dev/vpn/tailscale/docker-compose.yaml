services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    hostname: docker-gateway
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      # Você precisará rodar um comando para autenticar este nó no Headscale
      - TS_EXTRA_ARGS=--login-server=http://headscale:8080 --advertise-exit-node
    volumes:
      - tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      - local-network

volumes:
  tailscale_data:

networks:
  local-network:
    external: true
